<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider Layout</title>
    <link rel="stylesheet" href="style.css"> <!-- CSS 파일 연결 -->
</head>

<body>
    <div class="header">
        <div class="header-left">
            <!-- 왼쪽 아이콘 이미지 -->
            <img src="Sample_icon.png" alt="아이콘" class="header-icon">
        </div>
        <div class="header-center">자가진단 서비스</div>
        <div class="header-right">
            <!-- 네비게이션 링크 -->
            <a href="test1.html" class="nav-link">About</a>
            <a href="test2.html" class="nav-link">Post</a>
            <a href="test3.html" class="nav-link">Etc</a>
        </div>
    </div>

    <!-- Middle Header (이미지 전환) -->
    <div class="middle-header">
        <div class="slider-container">
            <div class="slider" id="slider">
                <img src="image1.jpg" alt="이미지 1" class="slider-image"> <!--임시 이미지-->
                <img src="image2.jpg" alt="이미지 2" class="slider-image">
                <img src="image3.jpg" alt="이미지 3" class="slider-image">
                <img src="image4.jpg" alt="이미지 4" class="slider-image">
            </div>
            <div class="controls">
                <button id="prev-btn">이전</button>
                <button id="next-btn">다음</button>
            </div>
        </div>
    </div>

    <!-- Middle Footer -->
    <div class="middle-footer">Middle 하단</div>

    <!-- Footer -->
    <div class="footer">Footer (하단)</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
